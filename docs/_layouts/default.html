<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {%- seo -%}
    <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
    {%- feed_meta -%}
    
    <!-- Mermaid JS with optimized layout -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/elkjs/lib/elk.bundled.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        mermaid.initialize({ 
          startOnLoad: false,
          theme: 'default',
          themeVariables: {
            primaryColor: '#f9f9f9',
            primaryTextColor: '#333',
            primaryBorderColor: '#ccc',
            lineColor: '#333',
            secondaryColor: '#f4f4f4',
            tertiaryColor: '#fff'
          },
          // Class diagram specific configuration
          classDiagram: {
            htmlLabels: true,
            useMaxWidth: true,
            diagramMarginX: 50,
            diagramMarginY: 50
          },
          // Flowchart configuration with ELK support
          flowchart: {
            useMaxWidth: true,
            htmlLabels: true,
            defaultRenderer: 'elk'
          }
        });
        
        // Find all code blocks with mermaid language
        document.querySelectorAll('pre code.language-mermaid').forEach(function(element) {
          // Get the text content
          var graphDefinition = element.textContent;
          
          // Check if the diagram has ELK layout configuration
          var hasElkConfig = graphDefinition.includes('---') && graphDefinition.includes('layout: elk');
          
          // Create a div to hold the rendered graph
          var graphDiv = document.createElement('div');
          graphDiv.className = 'mermaid';
          
          // Apply ELK configuration if specified, otherwise use default optimizations
          var diagramType = graphDefinition.trim().split('\n')[0].toLowerCase();
          console.log('Processing diagram:', diagramType, 'hasElkConfig:', hasElkConfig);
          
          if (hasElkConfig) {
            // Convert frontmatter ELK config to %%{init}%% directive that Mermaid understands
            graphDefinition = graphDefinition.replace(/^---[\s\S]*?---\n/, '');
            // Apply ELK configuration based on diagram type
            if (diagramType.includes('classdiagram')) {
              graphDefinition = '%%{init: {"layout": "elk", "elk": {"algorithm": "layered", "direction": "DOWN", "spacing": {"nodeNode": 50}}, "theme": "default"}}%%\n' + graphDefinition;
              console.log('Applied ELK layout to class diagram');
            } else if (diagramType.includes('flowchart') || diagramType.includes('graph')) {
              graphDefinition = '%%{init: {"flowchart": {"defaultRenderer": "elk"}, "elk": {"algorithm": "layered", "direction": "DOWN", "spacing": {"nodeNode": 50, "edgeNode": 20}}, "theme": "default"}}%%\n' + graphDefinition;
              console.log('Applied ELK layout to flowchart/graph');
            }
          } else if (diagramType.includes('flowchart') || diagramType.includes('graph')) {
            // ELK layout for flowcharts and graphs without explicit config
            graphDefinition = '%%{init: {"flowchart": {"defaultRenderer": "elk"}, "elk": {"algorithm": "layered", "direction": "DOWN", "spacing": {"nodeNode": 50, "edgeNode": 20}}, "theme": "default"}}%%\n' + graphDefinition;
            console.log('Applied default ELK layout to flowchart/graph');
          } else if (diagramType.includes('classdiagram')) {
            // Optimize class diagrams with better margins and HTML labels
            graphDefinition = '%%{init: {"classDiagram": {"htmlLabels": true, "useMaxWidth": true, "diagramMarginX": 50, "diagramMarginY": 50}, "theme": "default"}}%%\n' + graphDefinition;
            console.log('Applied standard layout to class diagram');
          }
          
          console.log('Final graph definition:', graphDefinition.substring(0, 200) + '...');
          
          graphDiv.textContent = graphDefinition;
          
          // Replace the pre element with the new div
          element.closest('pre').replaceWith(graphDiv);
        });
        
        // Initialize mermaid to render the new divs
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
      });
    </script>
  </head>

  <body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

  </body>

</html>
